[build]
  publish = "public"
  command = "gatsby build"

[build.environment]
  NODE_VERSION = "18"
  NODE_OPTIONS = "--max_old_space_size=4096"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    X-Frame-Options = "ALLOW-FROM https://lambertphotography.com"
    Content-Security-Policy = "frame-ancestors 'self' https://www.youtube.com https://youtu.be"

[[edge_functions]]
  function = "hello" 
  path = "/hello"
